name: Android CI

on:
  push:
    branches: [ "develop", "release_wss", "release/*", "hotfix" ]
  pull_request:
    branches: [ "develop", "release_wss", "release/*", "hotfix" ]

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Load Google Service file
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $DATA | base64 -di > app/google-services.json

      - name: Create local.properties
        env:
          DEBUG_BASE_URL: ${{ secrets.DEBUG_BASE_URL }}
          RELEASE_BASE_URL: ${{ secrets.RELEASE_BASE_URL }}
          S3_BASE_URL: ${{ secrets.S3_BASE_URL }}
          KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
          AMPLITUDE_KEY: ${{ secrets.AMPLITUDE_KEY }}
        run: |
          echo debug.base.url=\"$DEBUG_BASE_URL\" >> ./local.properties
          echo release.base.url=\"$RELEASE_BASE_URL\" >> ./local.properties
          echo s3.url=\"$S3_BASE_URL\" >> ./local.properties
          echo kakao.app.key=\"$KAKAO_APP_KEY\" >> ./local.properties
          echo amplitude.key=\"$AMPLITUDE_KEY\" >> ./local.properties

      - name: Run Ktlint
        if: github.event_name == 'pull_request'
        uses: ScaCap/action-ktlint@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          android: true
          fail_on_error: true
          reporter: github-pr-review

      # 2. PR용: 모든 모듈의 로직을 검증하되, 빌드(컴파일)는 앱 중심으로 효율화
      - name: Test & Assemble (PR)
        if: github.event_name == 'pull_request'
        # 1. 모든 모듈의 유닛 테스트 실행 (로직 검증)
        # 2. 앱 모듈 디버그 빌드 실행 (의존성 모듈 자동 포함 빌드)
        run: ./gradlew testDebugUnitTest :app:assembleDebug --scan

      # 3. Merge(Push)용: 전체 검증 (안전장치)
      - name: Full Build (Push)
        if: github.event_name == 'push'
        run: ./gradlew build --scan
        
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

      - name: Post Unit Test summary as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const status = "${{ steps.test.outcome }}"; // success | failure | cancelled | skipped
            const emoji = { success: "✅", failure: "❌", cancelled: "⚠️", skipped: "⏭️" };
            const ko = { success: "성공", failure: "실패", cancelled: "취소", skipped: "스킵" };

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const marker = "<!-- unit-test-summary -->";
            let body =
              `${marker}\n` +
              `### ${emoji[status] || "❔"} Android CI 요약\n\n` +
              `- **Unit Tests**: ${emoji[status] || "❔"} ${ko[status] || status}\n`;
            
            if (status !== "success") {
              body += `\n⚠️ **주의:** 실패한 단계: **Unit Tests**\n`;
              body += `자세한 로그는 [Actions 실행 로그](${runUrl})에서 확인하세요.\n`;
            } else {
              body += `\n🎉 SUCCESS! 🎉\n`;
              body += `로그: ${runUrl}\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existing = comments.find(c => (c.body || "").includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              body
              });
            }
